<!DOCTYPE html>

    <style>
        body {

            background-color: #000;
            color: #7affc1;
            font-family: Consolas, monospace;
            display: flex;
            justify-content: center;
            align-items: center;

        .container {
            max-width: 90%;

        }
        blockquote {
            margin-top: 30px;
            font-style: italic;
            color: #cccccc;
            padding: 0 10px;
            word-wrap: break-word;
            font-family: Consolas, monospace;
        }

        @media (max-width: 480px) {
